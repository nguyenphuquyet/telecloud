services:
  telecloud:
    # NOTE: pin to a tagged version in production (e.g. ghcr.io/dabeecao/telecloud-go:v3.4.1)
    image: ghcr.io/dabeecao/telecloud-go:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecloud
    restart: unless-stopped
    ports:
      # Bind to loopback only by default so the open /setup endpoint isn't
      # reachable from the public Internet. Front this with a reverse proxy
      # (Caddy/Nginx/Cloudflare Tunnel) or change "127.0.0.1" to "" / "0.0.0.0"
      # if you intentionally want public access.
      - "127.0.0.1:${PORT:-8091}:8091"
    env_file:
      - .env
    user: "65532:65532"
    environment:
      # Override paths to point inside /app/data volume
      - DATABASE_PATH=/app/data/database.db
      - THUMBS_DIR=/app/data/thumbs
      - TEMP_DIR=/app/data/temp
      # Optional: Paths to FFmpeg, yt-dlp and aria2c. These are built into the Docker image,
      # but you can override them here if you want to use external binaries.
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - YTDLP_PATH=/usr/local/bin/yt-dlp
      - TORRENT_PATH=/usr/bin/aria2c
      # Optional: 32-byte master key. If left blank, a secure 32-byte key is automatically
      # generated and saved to /app/data/master.key inside the persistent volume.
      # Put it in .env or uncomment here. Losing it means losing access to encrypted secrets.
      # TELECLOUD_MASTER_KEY=
      # Optional: One-time token to gate /setup against scanners until the admin account is created.
      # TELECLOUD_SETUP_TOKEN=
    volumes:
      # Persist database, thumbnails, temp files, and Telegram session
      - ./data:/app/data
    # NOTE: The runtime Docker image uses Alpine which includes 'wget',
    # so you can uncomment this healthcheck if you want to monitor the container status.
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8091/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 15s
